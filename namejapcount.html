<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Premium Ram Jap Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-animation"></div>

    <header class="glass-header">
        <button id="menuBtn"><i class="fas fa-bars"></i></button>
        <h1>🕉️ श्री राम</h1>
        <div style="display: flex; gap: 15px;">
            <button id="bgMusicBtn" title="Play Flute Music"><i class="fas fa-music"></i></button>
            <button id="soundToggle" title="Ram Ram Voice"><i class="fas fa-volume-up"></i></button>
        </div>
    </header>

    <nav class="sidebar glass-panel" id="menu">
        <button data-page="counter"><i class="fas fa-om"></i> Jap Counter</button>
        <button data-page="stats"><i class="fas fa-chart-bar"></i> Stats</button>
        <button data-page="leaderboard"><i class="fas fa-trophy"></i> Live Leaderboard</button>
        <button id="resetBtn"><i class="fas fa-sync-alt"></i> Reset All</button>
    </nav>

    <main class="main">
        <section id="counterPage" class="page active glass-panel">
            <div class="mala-container">
                <div class="mala" id="mala"></div>
                <button class="jap-btn" id="japBtn">राम</button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <p class="mala-count">Mala Completed: <span id="malaCount">0</span></p>

            <div class="statsBox">
                <div class="stat-item"><span>Today</span><strong id="today">0</strong></div>
                <div class="stat-item"><span>Total</span><strong id="total">0</strong></div>
            </div>
        </section>

        <section id="statsPage" class="page glass-panel">
            <h2>📊 Your Devotion</h2>
            <div class="big-stat">
                <p>Lifetime Jap</p>
                <h1 id="totalStat" style="color: gold;">0</h1>
            </div>
            <div class="big-stat">
                <p>Today's Jap</p>
                <h2 id="todayStat" style="color: #ff7b00;">0</h2>
            </div>
        </section>

        <section id="leaderboardPage" class="page glass-panel">
            <div class="big-stat" style="margin-top: 0; padding: 15px;">
                <p>🌍 Global Maha-Jap</p>
                <h1 id="globalTotal" style="color: #00ff88; font-size: 32px;">0+</h1>
            </div>

            <h2>🏆 Live Top 10</h2>
            <div id="leaderboardList" style="text-align: left; max-height: 250px; overflow-y: auto;">
                <p>Loading Live Data... ⏳</p>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        Created with ❤️ by Ritik Tiwari | 📺 @ekanokhasafar
    </footer>

    <audio id="bgMusicPlayer" loop src="https://www.chosic.com/wp-content/uploads/2021/07/The-Epic-Hero-Epic-Cinematic-Keys-of-Moon-Music.mp3"></audio>

        <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="app.js"></script>
</body>
</html>
