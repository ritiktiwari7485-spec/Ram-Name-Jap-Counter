<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Ram Jap Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <header class="glass-header">
        <button id="menuBtn" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-bars"></i></button>
        <h1 id="mainTitle" style="font-family: 'Yatra One', cursive; color: var(--primary); font-size: 20px;">श्री राम</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="muteBtn" style="background:none; border:none; color:white;"><i class="fas fa-volume-up"></i></button>
            <img id="userPhoto" src="" style="width: 32px; height: 32px; border-radius: 50%; display: none; border: 2px solid gold;">
        </div>
    </header>

    <nav class="sidebar" id="menu">
        <div id="authSection" style="padding: 20px; text-align: center;">
            <div id="loginOptions">
                <button id="loginBtn" style="background:white; padding:10px; border-radius:8px; width:100%; font-weight:bold; margin-bottom:10px; border:none;">Google Login</button>
                <input type="text" id="guestNameInput" placeholder="अपना नाम" style="width:100%; padding:10px; border-radius:8px; margin-bottom:10px; border:none;">
                <button id="guestLoginBtn" style="background:var(--primary); color:white; width:100%; padding:10px; border-radius:8px; border:none;">प्रवेश करें</button>
            </div>
            <div id="welcomeText" style="display:none; color:gold;">जय श्री राम!</div>
        </div>
        <button id="navCounter"><i class="fas fa-om"></i> Jap Counter</button>
        <button id="navLeaderboard"><i class="fas fa-trophy"></i> Leaderboard</button>
        <button id="shareBtn"><i class="fab fa-whatsapp"></i> Share App</button>
        <button id="resetBtn" style="color:#ff4444;"><i class="fas fa-trash"></i> Reset All Data</button>
    </nav>

    <main>
        <section id="counterPage" class="page active glass-panel">
            <div class="mantra-slider" id="mantraSlider">
                <div class="mantra-chip active" onclick="setMantra('श्री राम', this)">श्री राम</div>
                <div class="mantra-chip" onclick="setMantra('ॐ नमः शिवाय', this)">ॐ नमः शिवाय</div>
                <div class="mantra-chip" onclick="setMantra('राधे कृष्ण', this)">राधे कृष्ण</div>
            </div>
            <div class="mala-container">
                <div class="mala" id="mala"></div>
                <button class="jap-btn" id="japBtn">राम</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <div class="stat-card"><span>Today</span><h3 id="today">0</h3></div>
                <div class="stat-card"><span>Mala</span><h3 id="malaCount">0</h3></div>
                <div class="stat-card"><span>Total</span><h3 id="total">0</h3></div>
            </div>
            <div class="badge-grid">
                <span class="badge-item" id="b1">Karmyogi</span>
                <span class="badge-item" id="b2">Sadhak</span>
                <span class="badge-item" id="b3">Bhakt</span>
            </div>
        </section>

        <section id="leaderboardPage" class="page glass-panel">
            <h2>🏆 Global Leaderboard</h2>
            <div id="leaderboardList" style="margin-top:20px;"></div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
