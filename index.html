<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Ram Jap - Created by Ritik Tiwari</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <header class="glass-header">
        <button id="mBtn" style="background:none; border:none; color:white; font-size:22px;"><i class="fas fa-bars"></i></button>
        <h1 id="mTitle" style="font-family: 'Yatra One'; color: var(--primary); font-size: 20px;">श्री राम</h1>
        <button id="muteB" style="background:none; border:none; color:white;"><i class="fas fa-volume-up"></i></button>
    </header>

    <nav class="sidebar" id="side">
        <div style="padding: 20px; text-align: center;">
            <div id="authBox">
                <button id="loginBtn"><img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18"> Google Login</button>
                <input type="text" id="gName" placeholder="अपना नाम लिखें" style="width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:10px;">
                <button id="gLoginBtn" style="background:var(--primary); color:white; width:100%; padding:10px; border-radius:8px; border:none; font-weight:bold;">Guest Login</button>
            </div>
            <div id="wMsg" style="display:none; color:gold; font-weight:bold; margin-top:10px;"></div>
            <p style="font-size:10px; color:#aaa; margin-top:10px;">Channel: @ekanokhasafar</p>
        </div>
        <button id="goCounter"><i class="fas fa-om"></i> Jap Counter</button>
        <button id="goLeader"><i class="fas fa-trophy"></i> Leaderboard</button>
        <button id="shareB"><i class="fab fa-whatsapp"></i> Share App</button>
        <button id="rBtn" style="color:red;"><i class="fas fa-trash"></i> Reset Data</button>
    </nav>

    <main>
        <section id="counterPage" class="page active glass-panel">
            <div class="mantra-slider">
                <div class="mantra-chip active" onclick="stM('श्री राम', 'राम', this)">श्री राम</div>
                <div class="mantra-chip" onclick="stM('ॐ नमः शिवाय', 'नमः शिवाय', this)">ॐ नमः शिवाय</div>
                <div class="mantra-chip" onclick="stM('राधे कृष्ण', 'राधे कृष्ण', this)">राधे कृष्ण</div>
            </div>
            <div class="mala-container">
                <div class="mala" id="mala"></div>
                <button class="jap-btn" id="jBtn">राम</button>
            </div>
            <div style="display:flex; justify-content:space-around; margin-top:10px;">
                <div><span style="font-size:12px; opacity:0.6;">Today</span><h3 id="td">0</h3></div>
                <div><span style="font-size:12px; opacity:0.6;">Mala</span><h3 id="mc">0</h3></div>
                <div><span style="font-size:12px; opacity:0.6;">Total</span><h3 id="tl">0</h3></div>
            </div>
            <div class="badge-grid">
                <span class="badge-item" id="b1">Karmyogi</span>
                <span class="badge-item" id="b2">Sadhak</span>
                <span class="badge-item" id="b3">Bhakt</span>
            </div>
        </section>

        <section id="leaderboardPage" class="page glass-panel">
            <h2 style="margin-bottom:20px; color:gold;">🏆 Leaderboard</h2>
            <div id="lList"></div>
        </section>
    </main>

    <div class="footer-credit">
        <p>Created with Devotion by <b>Ritik Tiwari</b></p>
        <p>YouTube: @ekanokhasafar</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
